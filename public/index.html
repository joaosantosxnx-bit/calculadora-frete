<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Frete GEOFIN</title>
  <link rel="stylesheet" href="/style.css?v=10">
</head>
<body>

  <div class="page">

    <header class="header">
      <div class="brand">
        <img src="/assets/logo-f.png" class="logo-symbol" alt="Logo">
        <img src="/assets/logo-geofin.png" class="logo-geofin" alt="Geofin">
      </div>

      <div class="header-info">
        <span class="tag">VERSÃO BETA</span>
        <h1>Calculadora de Frete</h1>
      </div>
    </header>

    <main class="main">

      <section class="panel form-panel">
        <h2>Dados da Cotação</h2>

        <div class="field">
          <label>Origem</label>
          <input type="text" value="Serra - ES" readonly>
        </div>

        <div class="field">
          <label>UF destino</label>
          <select id="ufDestino">
            <option value="">Selecione</option>
            <option value="ES">Espírito Santo</option>
            <option value="SP">São Paulo</option>
          </select>
        </div>

        <div class="field">
          <label>Valor da Nota Fiscal</label>
          <input id="valorNota" type="number" placeholder="Ex: 25000">
        </div>

        <div class="field">
          <label>Peso da Carga KG</label>
          <input id="peso" type="number" placeholder="Ex: 1000">
        </div>

        <button onclick="calcular()">Calcular Frete</button>
      </section>

      <section class="panel result-panel" id="resultado">
        <div class="empty">
          <h2>Resultado da Simulação</h2>
          <p>Preencha os dados para visualizar o comparativo.</p>
        </div>
      </section>

    </main>

    <section class="panel history-panel">
      <div class="history-title">
        <h2>Últimas Cotações</h2>
        <span>Histórico local</span>
      </div>

      <div id="historicoLista"></div>
    </section>

    <footer>
      Uso interno GEOFIN • Ambiente de teste
    </footer>

  </div>

  <script src="/script.js?v=10"></script>
</body>
</html>
