<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Frete GEOFIN</title>
  <link rel="stylesheet" href="/style.css?v=16">
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand" aria-label="GEOFIN">
        <img src="/assets/logo-f.png" class="logo-symbol" alt="">
        <img src="/assets/logo-geofin.png" class="logo-geofin" alt="GEOFIN">
      </div>

      <div class="header-info">
        <span class="tag">VERSÃO BETA</span>
        <h1>Calculadora de Frete</h1>
        <p>Simulação interna com origem fixa em Serra - ES.</p>
        <button class="theme-toggle" id="btnTema" type="button" aria-pressed="false">Modo claro</button>
      </div>
    </header>

    <main class="main">
      <section class="panel form-panel" aria-labelledby="titulo-formulario">
        <div class="section-heading">
          <span>Entrada</span>
          <h2 id="titulo-formulario">Dados da Cotação</h2>
        </div>

        <div class="field">
          <label for="origem">Origem</label>
          <input id="origem" type="text" value="Serra - ES" readonly>
        </div>

        <div class="field">
          <label for="ufDestino">UF destino</label>
          <select id="ufDestino">
            <option value="">Selecione</option>
            <option value="ES">Espírito Santo</option>
            <option value="SP_CAPITAL">São Paulo - Capital</option>
            <option value="SP_INTERIOR">São Paulo - Interior</option>
            <option value="MG">Minas Gerais</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="BA">Bahia</option>
            <option value="PR">Paraná</option>
            <option value="SC">Santa Catarina</option>
            <option value="AL">Alagoas</option>
          </select>
        </div>

        <div class="field">
          <label for="valorNota">Valor da nota fiscal</label>
          <input id="valorNota" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Ex: 25000">
        </div>

        <div class="field">
          <label for="peso">Peso da carga (kg)</label>
          <input id="peso" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Ex: 1000">
        </div>

        <button id="btnCalcular" type="button">Calcular frete</button>
      </section>

      <section class="panel result-panel" id="resultado" aria-live="polite">
        <div class="empty">
          <span>Comparativo</span>
          <h2>Resultado da Simulação</h2>
          <p>Preencha os dados para visualizar SAGIX e TJB lado a lado.</p>
        </div>
      </section>
    </main>

    <section class="panel history-panel" aria-labelledby="titulo-historico">
      <div class="history-title">
        <div>
          <span>Histórico local</span>
          <h2 id="titulo-historico">Últimas Cotações</h2>
        </div>
        <div class="history-actions" aria-label="Ações do histórico">
          <div class="filter-group" aria-label="Filtrar histórico por UF">
            <button class="filter-button is-active" data-filtro="" type="button">Todos</button>
            <button class="filter-button" data-filtro="ES" type="button">ES</button>
            <button class="filter-button" data-filtro="SP_CAPITAL" type="button">SP Cap.</button>
            <button class="filter-button" data-filtro="SP_INTERIOR" type="button">SP Int.</button>
            <button class="filter-button" data-filtro="MG" type="button">MG</button>
            <button class="filter-button" data-filtro="RJ" type="button">RJ</button>
            <button class="filter-button" data-filtro="BA" type="button">BA</button>
            <button class="filter-button" data-filtro="PR" type="button">PR</button>
            <button class="filter-button" data-filtro="SC" type="button">SC</button>
            <button class="filter-button" data-filtro="AL" type="button">AL</button>
          </div>
          <button class="secondary-action" id="btnExportCsv" type="button">Exportar CSV</button>
        </div>
      </div>

      <div id="historicoLista"></div>
    </section>

    <footer>
      Uso interno GEOFIN • Ambiente de teste
    </footer>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="/script.js?v=16"></script>
</body>
</html>
