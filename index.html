<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Frete</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">
    <section class="painel">

      <div class="topo">
        <span class="beta">VERSÃO BETA</span>
        <h1>Calculadora de Frete</h1>
        <p>Simulação de custo por transportadora</p>
      </div>

      <div class="formulario">

        <div class="grupo">
          <label>Origem</label>
          <select disabled>
            <option>Serra - ES</option>
          </select>
        </div>

        <div class="grupo">
          <label>UF destino</label>
          <select id="ufDestino">
            <option value="">Selecione</option>
            <option value="ES">Espírito Santo</option>
            <option value="SP">São Paulo</option>
          </select>
        </div>

        <div class="grupo">
          <label>Valor da Nota Fiscal</label>
          <input id="valorNota" type="number" placeholder="Ex: 25000">
        </div>

        <div class="grupo">
          <label>Peso da Carga KG</label>
          <input id="peso" type="number" placeholder="Ex: 1000">
        </div>

        <button onclick="calcular()">Calcular Frete</button>

      </div>

      <div id="resultado"></div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
